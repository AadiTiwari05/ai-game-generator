<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Game Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --secondary: #10b981;
            --secondary-hover: #059669;
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 900px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        /* Header Styles */
        .header {
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        /* Input Card Styles */
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        textarea {
            width: 100%;
            height: 120px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1rem;
            color: var(--text-main);
            font-family: inherit;
            font-size: 1rem;
            resize: vertical;
            transition: border-color 0.3s ease;
            margin-bottom: 1.25rem;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        textarea::placeholder {
            color: var(--text-muted);
        }

        /* Button Controls */
        .controls {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        button {
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #generateButton {
            background-color: var(--primary);
            color: white;
            flex: 1;
            min-width: 200px;
        }

        #generateButton:hover:not(:disabled) {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        #downloadButton {
            background-color: var(--secondary);
            color: white;
        }

        #downloadButton:hover:not(:disabled) {
            background-color: var(--secondary-hover);
            transform: translateY(-2px);
        }

        button:disabled {
            background-color: var(--border-color);
            color: var(--text-muted);
            cursor: not-allowed;
            transform: none;
        }

        #statusText {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: var(--text-muted);
            text-align: center;
            min-height: 20px;
        }

        /* Output Section Styles */
        .preview-header {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            font-weight: 600;
            color: #e2e8f0;
        }

        .iframe-container {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid var(--border-color);
            background-color: white; /* Keeps the game background neutral */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        iframe {
            width: 100%;
            height: 600px;
            border: none;
            display: block;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .controls {
                flex-direction: column;
            }
            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>AI Game Generator</h1>
            <p style="color: var(--text-muted);">Bring your imagination to life in seconds.</p>
        </div>

        <div class="card">
            <textarea id="promptInput" placeholder="Describe the game you want to create..."></textarea>
            
            <div class="controls">
                <button id="generateButton">Generate Game</button>
                <button id="downloadButton" disabled>Download Game</button>
            </div>
            
            <p id="statusText"></p>
        </div>

        <div>
            <h2 class="preview-header">Live Preview</h2>
            <div class="iframe-container">
                <iframe id="gamePreview" title="Game Preview"></iframe>
            </div>
        </div>
    </div>

    <script>
        const promptInput = document.getElementById("promptInput");
        const generateButton = document.getElementById("generateButton");
        const gamePreview = document.getElementById("gamePreview");
        const statusText = document.getElementById("statusText");
        const downloadButton = document.getElementById("downloadButton");
        let latestGameHtml = "";

        generateButton.addEventListener("click", async () => {
            const prompt = promptInput.value;
            
            if (!prompt.trim()) {
                statusText.textContent = "Please enter a description first.";
                return;
            }

            statusText.textContent = "Generating game... Please wait.";
            generateButton.disabled = true;
            
            try {
                const response = await fetch("/generate", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        prompt: prompt
                    })
                });

                const data = await response.json();

                if(!response.ok) {
                    statusText.textContent = data.detail || "Something went wrong.";
                    return;
                }

                gamePreview.srcdoc = data.game_html;
                latestGameHtml = data.game_html;
                downloadButton.disabled = false; 
                statusText.textContent = "Game generated successfully!";
            }
            catch (error) {
                statusText.textContent = "Network error. Please try again.";
            }
            finally {
                generateButton.disabled = false;
            }
        });

        downloadButton.addEventListener("click", () => {
            if(!latestGameHtml) {
                return;
            }
            const file = new Blob([latestGameHtml], {
                type: "text/html"
            });

            const url = URL.createObjectURL(file);

            const link = document.createElement("a");
            link.href = url;
            link.download = "generated-game.html";
            link.click();

            URL.revokeObjectURL(url);
        });
    </script>
</body>
</html>
